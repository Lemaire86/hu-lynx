<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HU‑LYNX — Radio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="radio.css">
</head>

<body>

<header class="navbar">
  <div class="logo">
    <img src="assets/logo.png" alt="HU-LYNX Logo">
  </div>

  <nav class="nav-links">
    <a href="index.html" data-page="index">Home</a>
    <a href="live-tv.html" data-page="live-tv">Live TV</a>
    <a href="pays.html" data-page="pays">Pays</a>
    <a href="categories.html" data-page="categories">Categories</a>
    <a href="radio.html" data-page="radio">Radio</a>
    <button>Sign In</button>
  </nav>
</header>

<div class="page">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="sidebar-header">
      <div class="search-bar">
        <input type="text" id="search-radio" placeholder="Search station...">
      </div>

      <button id="all-stations-btn">ALL STATIONS</button>
    </div>

    <div class="station-list" id="station-list"></div>

  </aside>

  <!-- MAIN CONTENT -->
  <main class="content">

    <!-- FIXED BOTTOM LEFT RADIO PLAYER -->
<div class="radio-bottom-player">
  <div class="player-controls">
    <button id="prev-btn">⟨ Prev</button>
    <button id="next-btn">Next ⟩</button>
  </div>

  <h4 id="bottom-title">Select a station</h4>
  <audio id="bottom-player" controls></audio>
</div>

    <!-- GRID -->
    <h2 class="grid-title">Radio Stations</h2>
    <div class="grid" id="station-grid"></div>

  </main>

</div>

<footer class="footer">
  © 2026 HU‑LYNX — Worldwide Streaming Platform
</footer>

<script src="radio.js"></script>

<script>
  let currentPage = window.location.pathname.split("/").pop();
  if (currentPage === "" || currentPage === "/") currentPage = "radio.html";
  currentPage = currentPage.replace(".html", "");

  document.querySelectorAll(".nav-links a").forEach(link => {
    if (link.dataset.page === currentPage) link.classList.add("active");
  });
</script>

</body>
</html>
